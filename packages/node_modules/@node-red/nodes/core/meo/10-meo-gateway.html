<script type="text/html" data-template-name="meo-gateway">
    <div class="form-row">
        <label for="node-config-input-host"><i class="fa fa-server"></i> <span data-i18n="meo.label.host"></span></label>
        <input type="text" id="node-config-input-host" data-i18n="[placeholder]meo.placeholder.host">
    </div>
    <div class="form-row">
        <label for="node-config-input-port"><i class="fa fa-plug"></i> <span data-i18n="meo.label.port"></span></label>
        <input type="text" id="node-config-input-port" data-i18n="[placeholder]meo.placeholder.port">
    </div>
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> <span data-i18n="common.label.name"></span></label>
        <input type="text" id="node-config-input-name" data-i18n="[placeholder]common.label.name">
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType('meo-gateway', {
        category: 'config',
        defaults: {
            name: { value: "" },
            host: { value: "localhost", required: true },
            port: { value: 7070, required: true, validate: RED.validators.number() }
        },
        label: function() {
            return this.name || (this.host + ":" + this.port);
        }
    });
</script>
