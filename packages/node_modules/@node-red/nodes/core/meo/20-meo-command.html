<script type="text/html" data-template-name="meo-command">
    <div class="form-row">
        <label for="node-input-gateway"><i class="fa fa-sitemap"></i> <span data-i18n="meo.label.gateway"></span></label>
        <input type="text" id="node-input-gateway">
    </div>
    <div class="form-row">
        <label for="node-input-device"><i class="fa fa-microchip"></i> <span data-i18n="meo.label.device"></span></label>
        <select id="node-input-device" style="width:60%"></select>
        <button type="button" class="red-ui-button red-ui-button-small meo-refresh" id="node-input-device-refresh">
            <i class="fa fa-refresh"></i>
        </button>
    </div>
    <div class="form-row meo-note-row">
        <label>&nbsp;</label>
        <span class="meo-note" id="node-input-device-note"></span>
    </div>
    <div class="form-row">
        <label for="node-input-cap"><i class="fa fa-bolt"></i> <span data-i18n="meo.label.cap"></span></label>
        <select id="node-input-cap" style="width:70%"></select>
    </div>
    <div class="form-row" id="node-input-value-row">
        <label for="node-input-value"><i class="fa fa-sliders"></i> <span data-i18n="meo.label.value"></span></label>
        <input type="text" id="node-input-value" style="width:70%">
        <input type="hidden" id="node-input-valueType">
    </div>
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> <span data-i18n="common.label.name"></span></label>
        <input type="text" id="node-input-name" data-i18n="[placeholder]common.label.name">
    </div>

    <style>
        /* Mirrors the MEO sidebar (_meo.scss): tokens only, no fixed colours,
           so both editor themes stay correct. */
        .meo-note-row {
            margin-top: -8px;
        }
        .meo-note {
            font-size: 0.85em;
            color: var(--red-ui-tertiary-text-color);
        }
        .meo-note-error {
            color: var(--red-ui-error-background, #a33);
        }
        .meo-note .red-ui-button {
            margin-left: 6px;
        }
        button.meo-refresh {
            margin-left: 4px;
            vertical-align: top;
        }
    </style>
</script>

<script type="text/javascript">
    (function() {
        // Capability labels, fetched once per editor load so a node's label is
        // right before its dialog has ever been opened.
        var catalog = {};
        var catalogList = [];
        $.getJSON('meo/capabilities', function(list) {
            catalogList = list || [];
            catalogList.forEach(function(cap) { catalog[cap.id] = cap; });
        });

        function capLabel(id) {
            return (catalog[id] && catalog[id].label) ||
                ("0x" + Number(id).toString(16).toUpperCase());
        }

        RED.nodes.registerType('meo-command', {
            category: 'MEO',
            color: "#b8dfc8",
            defaults: {
                name: { value: "" },
                gateway: { value: "", type: "meo-gateway", required: true },
                device: { value: "", required: true },
                // Kept so the canvas label survives an offline gateway.
                deviceName: { value: "" },
                cap: { value: 0, required: true, validate: RED.validators.number() },
                value: { value: "payload" },
                valueType: { value: "msg" }
            },
            inputs: 1,
            outputs: 1,
            icon: "light.svg",
            paletteLabel: function() {
                return RED._("node-red:meo.palette.command");
            },
            label: function() {
                if (this.name) { return this.name; }
                var device = this.deviceName || this.device;
                var cap = this.cap ? capLabel(this.cap) : RED._("node-red:meo.palette.command");
                return device ? (cap + " → " + device) : cap;
            },
            labelStyle: function() {
                return this.name ? "node_label_italic" : "";
            },
            oneditprepare: function() {
                var node = this;
                var deviceSelect = $("#node-input-device");
                var capSelect = $("#node-input-cap");
                var note = $("#node-input-device-note");
                var devices = [];

                // There is realistically one gateway per Node-RED instance, so
                // reuse it (or silently create it) instead of making every
                // command node's author pick/add it by hand. "localhost" stays
                // the host value - Node-RED resolves it itself - but label the
                // config with the address the browser used to get here, so it
                // doesn't misleadingly read "localhost" when opened remotely.
                // If more than one gateway already exists, picking one for the
                // user would be a guess, not a default - leave the field alone
                // so they choose explicitly.
                (function ensureGatewayDefault() {
                    var gatewaySelect = $("#node-input-gateway");
                    if (node.gateway) { return; }

                    var existing = [];
                    RED.nodes.eachConfig(function(cfg) {
                        if (cfg.type === "meo-gateway") { existing.push(cfg); }
                    });
                    if (existing.length > 1) { return; }

                    var target = existing[0];
                    if (!target) {
                        target = {
                            id: RED.nodes.id(),
                            _def: RED.nodes.getType("meo-gateway"),
                            type: "meo-gateway",
                            z: "",
                            users: [],
                            host: "localhost",
                            port: 7070,
                            // Not run through RED._(): it's a generated identifier, not
                            // translatable UI copy, and building it from i18n risked a
                            // race against the locale bundle still loading over the network.
                            name: "MEO Gateway (" + window.location.hostname + ")"
                        };
                        RED.nodes.add(target);
                        RED.nodes.dirty(true);
                        gatewaySelect.find('option[value="_ADD_"]').remove();
                        $("<option></option>").val(target.id).text(target.name).appendTo(gatewaySelect);
                    }

                    node.gateway = target.id;
                    gatewaySelect.val(target.id).trigger("change");
                }());

                $("#node-input-value").typedInput({
                    default: 'msg',
                    typeField: $("#node-input-valueType"),
                    types: ['num', 'msg', 'flow', 'global', 'env']
                });

                // ── Device ────────────────────────────────────────────
                function gatewayParams() {
                    var id = $("#node-input-gateway").val();
                    if (!id || id === "_ADD_") { return null; }
                    var gateway = RED.nodes.node(id);
                    if (!gateway) { return null; }
                    return { host: gateway.host, port: gateway.port };
                }

                function setNote(text, isError) {
                    note.empty().toggleClass("meo-note-error", !!isError).text(text || "");
                }

                function loadDevices() {
                    var params = gatewayParams();
                    deviceSelect.empty().prop("disabled", true);
                    if (!params) {
                        setNote(RED._("node-red:meo.devices.noGateway"));
                        rebuildCapabilities();
                        return;
                    }
                    setNote(RED._("node-red:meo.devices.loading"));
                    $.getJSON('meo/devices', params)
                        .done(function(list) {
                            devices = list || [];
                            deviceSelect.prop("disabled", false);
                            renderDevices();
                        })
                        .fail(function() {
                            devices = [];
                            renderDevices();
                            setNote(RED._("node-red:meo.devices.loadError"), true);
                            $('<button type="button" class="red-ui-button red-ui-button-small"></button>')
                                .text(RED._("node-red:meo.devices.retry"))
                                .appendTo(note)
                                .on('click', loadDevices);
                        });
                }

                function renderDevices() {
                    deviceSelect.empty();
                    devices.forEach(function(device) {
                        $('<option></option>')
                            .val(device.deviceId)
                            // Carried separately so oneditsave stores the name
                            // itself, not whatever decoration the option text has.
                            .attr('data-name', device.name || device.deviceId)
                            .text(device.name || device.deviceId)
                            .appendTo(deviceSelect);
                    });
                    // Never silently drop a device the gateway no longer lists —
                    // editing an unrelated field would otherwise repoint the node.
                    var known = devices.some(function(d) { return d.deviceId === node.device; });
                    if (node.device && !known) {
                        $('<option></option>')
                            .val(node.device)
                            .attr('data-name', node.deviceName || node.device)
                            .text((node.deviceName || node.device) + " " + RED._("node-red:meo.devices.missing"))
                            .appendTo(deviceSelect);
                    }
                    if (devices.length === 0 && !node.device) {
                        $('<option></option>').val("").text(RED._("node-red:meo.devices.empty")).appendTo(deviceSelect);
                        deviceSelect.prop("disabled", true);
                    }
                    deviceSelect.val(node.device);
                    onDeviceChange();
                }

                function selectedDevice() {
                    var id = deviceSelect.val();
                    return devices.filter(function(d) { return d.deviceId === id; })[0];
                }

                // Nothing here writes to the node — a cancelled dialog must
                // leave it exactly as it was. oneditsave owns persistence.
                function onDeviceChange() {
                    var device = selectedDevice();
                    if (device) {
                        var meta = device.macAddress || device.deviceId;
                        if (device.model) { meta += " · " + device.model; }
                        setNote(meta);
                    } else if (deviceSelect.val()) {
                        setNote(RED._("node-red:meo.devices.missingNote"), true);
                    }
                    rebuildCapabilities();
                }

                // ── Capability ────────────────────────────────────────
                // Options come from what the device declared at provisioning,
                // already filtered and labelled by the runtime.
                function rebuildCapabilities() {
                    var previous = capSelect.val() || node.cap;
                    var device = selectedDevice();
                    var available = (device && device.caps && device.caps.length)
                        ? device.caps
                        : catalogList.filter(function(cap) { return cap.kind !== "event"; });

                    capSelect.empty();
                    ["write", "read", "command"].forEach(function(kind) {
                        var group = available.filter(function(cap) { return cap.kind === kind; });
                        if (group.length === 0) { return; }
                        var optgroup = $('<optgroup></optgroup>')
                            .attr('label', RED._("node-red:meo.caps." + kind))
                            .appendTo(capSelect);
                        group.forEach(function(cap) {
                            $('<option></option>')
                                .val(cap.id)
                                .attr('data-kind', cap.kind)
                                .text(cap.label)
                                .appendTo(optgroup);
                        });
                    });

                    previous = previous ? String(previous) : "";
                    if (previous && capSelect.find('option[value="' + previous + '"]').length === 0) {
                        // Configured capability the device no longer declares.
                        $('<option></option>')
                            .val(previous)
                            .attr('data-kind', (catalog[previous] && catalog[previous].kind) || "write")
                            .text(capLabel(previous) + " " + RED._("node-red:meo.devices.missing"))
                            .appendTo(capSelect);
                    }
                    capSelect.val(previous);
                    onCapChange();
                }

                // Only writes take a value (docs/mqtt_messaging.md "Command").
                function onCapChange() {
                    var kind = capSelect.find('option:selected').attr('data-kind');
                    $("#node-input-value-row").toggle(kind === "write");
                }

                deviceSelect.on('change', onDeviceChange);
                capSelect.on('change', onCapChange);
                $("#node-input-device-refresh").on('click', loadDevices);
                $("#node-input-gateway").on('change', loadDevices);

                loadDevices();
            },
            oneditsave: function() {
                var selected = $("#node-input-device").find('option:selected');
                // Persist the display name so the canvas label survives a
                // gateway that is offline next time the flow is opened.
                this.deviceName = selected.attr('data-name') || "";
            }
        });
    }());
</script>
