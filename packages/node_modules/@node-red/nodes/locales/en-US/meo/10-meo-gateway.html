<script type="text/html" data-help-name="meo-gateway">
    <p>Points the MEO nodes at a MEO gateway (the <code>meo-open-service</code> hub).</p>
    <p>The gateway is what actually talks to your devices: it holds the device list built during
       provisioning, and it sends commands over MQTT on your behalf. The nodes only ever speak to
       the gateway's HTTP API.</p>
    <h3>Details</h3>
    <dl class="message-properties">
        <dt>Host<span class="property-type">string</span></dt>
        <dd>Where the gateway runs. <code>localhost</code> when Node-RED runs on the same box,
            which is the normal setup.</dd>
        <dt>Port<span class="property-type">number</span></dt>
        <dd>The gateway's HTTP port, <code>7070</code> by default
            (<code>MEO_SERVICE_PORT</code>).</dd>
    </dl>
    <p><b>Note:</b> the host is resolved by Node-RED, not by your browser, so
       <code>localhost</code> means the machine Node-RED runs on even when you open the editor
       from another computer.</p>
</script>
