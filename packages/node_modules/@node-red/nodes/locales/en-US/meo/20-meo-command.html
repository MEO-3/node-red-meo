<script type="text/html" data-help-name="meo-command">
    <p>Sends a command to a MEO device and outputs whatever the device answers.</p>
    <p>Pick a device, pick one of the capabilities it reported when it was provisioned, and — for
       outputs like an LED or a buzzer — the value to send. Turning the built-in LED on is
       <i>Built-in LED</i> with a value of <code>1</code>; <code>0</code> turns it off.</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt class="optional">payload<span class="property-type">number | boolean</span></dt>
        <dd>The value to send, when <b>Value</b> is left as <code>msg.payload</code>. Booleans
            become <code>1</code> and <code>0</code>, so an inject node's true/false works as-is.
            Ignored for sensors and generic commands, which carry no value.</dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload<span class="property-type">number</span></dt>
        <dd>What the device reported: the value it wrote for an output, or the value it read for
            a sensor.</dd>
        <dt>deviceId<span class="property-type">string</span></dt>
        <dd>The device that answered.</dd>
        <dt>cap<span class="property-type">number</span></dt>
        <dd>The capability that was invoked.</dd>
    </dl>
    <h3>Details</h3>
    <p>The node waits for the device's own reply, so a message only appears on the output once the
       device has actually done the work. If nothing comes back within ten seconds the node fails
       with <i>no reply</i> — usually a device that is powered off or off the network.</p>
    <p>Failures are reported as node errors, so a <b>catch</b> node can handle them. The most
       common ones are a device that has not been provisioned yet, and a capability the device
       does not implement.</p>
    <p>Capabilities are read live from the gateway. If the list is empty, check that the gateway
       is running and that the device finished provisioning.</p>
</script>
